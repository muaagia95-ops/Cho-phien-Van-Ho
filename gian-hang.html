<!DOCTYPE html>
<html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Thông tin gian hàng - Chợ phiên Vân Hồ</title><script src="gian-hang-data.js"></script><style>
:root{--green:#0b6b3a;--green2:#0e8a4d;--dark:#123524;--bg:#f7faf5;--text:#1f2937}*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}a{text-decoration:none}nav{position:sticky;top:0;z-index:20;background:rgba(11,107,58,.96);color:white;padding:13px 7%;display:flex;justify-content:space-between;align-items:center;box-shadow:0 4px 20px #0002}nav a,nav b{color:white}.hero{padding:72px 7%;color:white;background:linear-gradient(120deg,#073d25ee,#0b6b3aaa);background-position:center;background-size:cover}.hero h1{font-size:clamp(40px,6vw,72px);margin:0 0 12px}.hero p{font-size:20px;line-height:1.5;margin:0}main{padding:56px 7%}.layout{display:grid;grid-template-columns:1.1fr .9fr;gap:24px}.box{background:white;border-radius:22px;padding:24px;box-shadow:0 10px 25px #0001}.box h2{color:var(--green);margin:0 0 18px}.infoRow{padding:12px 0;border-bottom:1px solid #e5e7eb}.infoRow:last-child{border-bottom:0}.label{font-weight:700;color:var(--dark);display:block;margin-bottom:5px}.products{margin:0;padding-left:22px}.products li{margin:9px 0;line-height:1.5}.galleryTitle{margin:38px 0 18px;color:var(--dark);font-size:32px}.gallery{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.gallery img{width:100%;height:210px;object-fit:cover;border-radius:17px;cursor:pointer;box-shadow:0 8px 20px #0002}.empty{background:white;border-radius:18px;padding:24px;color:#607080;box-shadow:0 8px 20px #0001}.lightbox{display:none;position:fixed;inset:0;background:#000d;z-index:100;align-items:center;justify-content:center;padding:20px}.lightbox.show{display:flex}.lightbox img{max-width:96vw;max-height:90vh;border-radius:16px}footer{text-align:center;background:#08351f;color:white;padding:30px 7%}@media(max-width:900px){.layout{grid-template-columns:1fr}.gallery{grid-template-columns:repeat(2,1fr)}}@media(max-width:560px){main{padding:42px 5%}.gallery{grid-template-columns:1fr}.gallery img{height:230px}}
</style></head><body><nav><b>🌿 CHỢ PHIÊN VÂN HỒ</b><a href="index.html#gianhang">← Về danh sách gian hàng</a></nav><header class="hero" id="hero"><h1 id="shopName"></h1><p id="shopGroup"></p></header><main><div class="layout"><section class="box"><h2>Mặt hàng chính</h2><ul class="products" id="products"></ul></section><section class="box"><h2>Thông tin chủ gian hàng</h2><div class="infoRow"><span class="label">Họ và tên</span><span id="owner"></span></div><div class="infoRow"><span class="label">Số điện thoại</span><span id="phone"></span></div><div class="infoRow"><span class="label">Địa điểm</span><span id="address"></span></div></section></div><h2 class="galleryTitle">Hình ảnh gian hàng</h2><div class="gallery" id="gallery"></div><div class="empty" id="empty" style="display:none">Chưa cập nhật hình ảnh gian hàng.</div></main><footer><h3>CHỢ PHIÊN VÂN HỒ</h3><p>Không gian số quảng bá văn hóa, du lịch và sản phẩm địa phương</p></footer><div class="lightbox" id="lightbox"><img id="lightboxImg"></div><script>
const params=new URLSearchParams(location.search);const id=(params.get("id")||"01").padStart(2,"0");const shop=SHOP_DATA.shops.find(s=>s.id===id);const pad=n=>String(n).padStart(2,"0");if(!shop){document.body.innerHTML="<main style='padding:40px;font-family:Arial'><h2>Không tìm thấy gian hàng.</h2><p><a href='index.html#gianhang'>Về danh sách gian hàng</a></p></main>";}else{document.title=`${shop.name} - Chợ phiên Vân Hồ`;shopName.textContent=shop.name;shopGroup.textContent=shop.group;owner.textContent=shop.owner;phone.textContent=shop.phone;address.textContent=shop.address;products.innerHTML=shop.products.map(p=>`<li>${p}</li>`).join("");const cover=`${shop.folder}/01.jpg`;hero.style.backgroundImage=`linear-gradient(120deg,#073d25ee,#0b6b3aaa),url('${cover}')`;const checkImage=src=>new Promise(resolve=>{const img=new Image();img.onload=()=>resolve(true);img.onerror=()=>resolve(false);img.src=src;});(async()=>{let found=0,missing=0;const max=SHOP_DATA.imageMax||100;for(let i=1;i<=max;i++){const src=`${shop.folder}/${pad(i)}.jpg`;const ok=await checkImage(src);if(ok){found++;missing=0;const img=document.createElement("img");img.src=src;img.alt=`${shop.name} - ảnh ${pad(i)}`;img.onclick=()=>{lightboxImg.src=src;lightbox.classList.add("show")};gallery.appendChild(img);}else{missing++;if(missing>=10) break;}}if(found===0) empty.style.display="block";})();}lightbox.onclick=()=>lightbox.classList.remove("show");
</script></body></html>
