<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Văn hóa dân tộc - Chợ phiên Vân Hồ</title>
<script src="data.js"></script>
<style>
:root{--green:#0b6b3a;--dark:#123524;--bg:#f7faf5;--text:#1f2937}
*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}a{text-decoration:none}
nav{position:sticky;top:0;z-index:20;background:rgba(11,107,58,.96);color:white;padding:13px 7%;display:flex;justify-content:space-between;align-items:center;box-shadow:0 4px 20px #0002}
nav a,nav b{color:white}
.hero{padding:62px 7%;color:white;background:linear-gradient(120deg,#073d25ee,#0b6b3aaa);background-size:cover;background-position:center}
.hero h1{font-size:clamp(40px,6vw,72px);margin:0 0 12px}.hero p{font-size:20px;line-height:1.5;max-width:900px;margin:0}
main{padding:48px 7% 64px}
.gallery{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.gallery img{width:100%;height:220px;object-fit:cover;border-radius:18px;cursor:pointer;box-shadow:0 8px 20px #0002;display:block}
.empty{background:white;border-radius:18px;padding:26px;text-align:center;color:#607080;box-shadow:0 8px 20px #0001}
.lightbox{display:none;position:fixed;inset:0;background:#000d;z-index:100;align-items:center;justify-content:center;padding:20px}.lightbox.show{display:flex}.lightbox img{max-width:96vw;max-height:90vh;border-radius:16px}
footer{text-align:center;background:#08351f;color:white;padding:30px 7%}
@media(max-width:900px){.gallery{grid-template-columns:repeat(2,1fr)}}
@media(max-width:560px){main{padding:34px 5% 48px}.gallery{grid-template-columns:1fr}.gallery img{height:240px}}
</style>
</head>
<body>
<nav><b>🌿 CHỢ PHIÊN VÂN HỒ</b><a href="index.html">← Về trang chính</a></nav>
<header class="hero" id="hero"><h1 id="pageTitle"></h1><p id="pageDesc"></p></header>
<main><div class="gallery" id="gallery"></div><div class="empty" id="empty" style="display:none">Chưa có hình ảnh trong mục này.</div></main>
<footer><h3>CHỢ PHIÊN VÂN HỒ</h3><p>Không gian số quảng bá văn hóa, du lịch và sản phẩm địa phương</p></footer>
<div class="lightbox" id="lightbox"><img id="lightboxImg" alt=""></div>
<script>
const PAGE_ID="van-hoa";
const section=SITE_DATA.sections.find(s=>s.id===PAGE_ID);
const pageTitle=document.getElementById("pageTitle");
const pageDesc=document.getElementById("pageDesc");
const hero=document.getElementById("hero");
const gallery=document.getElementById("gallery");
const empty=document.getElementById("empty");
const lightbox=document.getElementById("lightbox");
const lightboxImg=document.getElementById("lightboxImg");
const pad=n=>String(n).padStart(2,"0");

pageTitle.textContent=section.icon+" "+section.title;
pageDesc.textContent=section.description;
hero.style.backgroundImage=`linear-gradient(120deg,#073d25ee,#0b6b3aaa),url('${section.folder}/01.jpg')`;

const checkImage=src=>new Promise(resolve=>{
  const probe=new Image();
  probe.onload=()=>resolve(true);
  probe.onerror=()=>resolve(false);
  probe.src=src;
});

(async()=>{
  let found=0;
  let missing=0;
  const max=SITE_DATA.imageMax||1000;
  for(let i=1;i<=max;i++){
    const src=`${section.folder}/${pad(i)}.jpg`;
    const ok=await checkImage(src);
    if(ok){
      found++;
      missing=0;
      const img=document.createElement("img");
      img.src=src;
      img.alt=`${section.title} - ảnh ${pad(i)}`;
      img.onclick=()=>{lightboxImg.src=src;lightbox.classList.add("show")};
      gallery.appendChild(img);
    }else{
      missing++;
      if(missing>=20) break;
    }
  }
  if(found===0) empty.style.display="block";
})();

lightbox.onclick=()=>lightbox.classList.remove("show");
</script>
</body>
</html>
